7:36 PM
SQLite is a lightweight database that lives as a single file on your computer (e.g. word_index.db). Unlike databases like PostgreSQL or MySQL, there's no server to run — you just read and write to the file directly.

It's perfect for this use case because:

Simple — one file, no setup
Fast — great for searching/counting words
Universal — built into Python, readable by tons of tools
Claude-accessible — easy to query programmatically
Think of it like a very powerful spreadsheet that you query with SQL instead of clicking around. For example, to find your most-used words it'd just be:

sql
SELECT word, count FROM user_words ORDER BY count DESC LIMIT 20;
