Here it is:

yaml
name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name chat_indexer chat_indexer.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat_indexer-windows
          path: dist/chat_indexer.exe
